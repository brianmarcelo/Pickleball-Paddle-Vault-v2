<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--bd:#0d2954;--bm:#1a4b8c;--bb:#2d72d2;--bl:#74b0f5;--tm:#0d2954;--ts:#2d5a9e;--tf:#6b92c4;--cb:rgba(255,255,255,0.72);--cbr:rgba(45,114,210,0.18);--ib:rgba(255,255,255,0.92);--sh:0 4px 18px rgba(13,41,84,0.11);--shl:0 8px 30px rgba(13,41,84,0.17);--r:16px;--rs:10px;}
body{font-family:'DM Sans',sans-serif;background:#d8eafd;color:var(--tm);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 90% 55% at 15% -5%,rgba(116,176,245,0.55) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 85% 105%,rgba(45,114,210,0.25) 0%,transparent 55%),linear-gradient(160deg,#c4dcfb 0%,#d8eafd 35%,#e8f3ff 70%,#f0f7ff 100%);}
.as{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse 90% 55% at 15% -5%,rgba(116,176,245,0.55) 0%,transparent 55%),radial-gradient(ellipse 70% 50% at 85% 105%,rgba(45,114,210,0.25) 0%,transparent 55%),linear-gradient(160deg,#c4dcfb 0%,#d8eafd 35%,#e8f3ff 70%,#f0f7ff 100%);}
.ac{background:rgba(255,255,255,0.88);border:1.5px solid var(--cbr);border-radius:24px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(13,41,84,0.18);backdrop-filter:blur(20px);}
.al{width:68px;height:68px;background:linear-gradient(145deg,#2d72d2,#0d2954);border-radius:20px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(45,114,210,0.45);}
.at{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;text-align:center;color:var(--bd);margin-bottom:4px;}
.asub{text-align:center;font-size:12px;color:var(--tf);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:24px;}
.gb{width:100%;padding:13px 16px;display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:1.5px solid #dadce0;border-radius:var(--r);color:#3c4043;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:box-shadow 0.2s,background 0.2s;margin-bottom:4px;}
.gb:hover{box-shadow:0 2px 8px rgba(0,0,0,0.12);background:#f8f9fa;}
.dv{display:flex;align-items:center;gap:12px;margin:14px 0;color:var(--tf);font-size:12px;}
.dv::before,.dv::after{content:'';flex:1;height:1px;background:var(--cbr);}
.atabs{display:flex;border:1.5px solid var(--cbr);border-radius:var(--rs);overflow:hidden;margin-bottom:22px;}
.atab{flex:1;padding:10px;background:transparent;border:none;color:var(--tf);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;}
.atab.active{background:linear-gradient(135deg,var(--bb),var(--bm));color:white;}
.af{margin-bottom:14px;}
.af label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--bb);font-weight:700;margin-bottom:5px;}
.af input{width:100%;background:var(--ib);border:1.5px solid var(--cbr);border-radius:var(--rs);padding:11px 13px;color:var(--tm);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.af input:focus{border-color:var(--bb);}
.aerr{font-size:12px;color:#dc2626;margin-bottom:8px;min-height:16px;text-align:center;}
.abtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--bb),var(--bm));border:none;border-radius:var(--r);color:white;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.4px;box-shadow:0 5px 18px rgba(45,114,210,0.35);transition:opacity 0.2s;margin-top:4px;}
.abtn:active{opacity:0.9;}
.agbtn{width:100%;padding:12px;background:transparent;border:1.5px solid var(--cbr);border-radius:var(--r);color:var(--tf);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:background 0.2s;}
.agbtn:active{background:rgba(45,114,210,0.07);}
#app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:104px;}
.hdr{padding:20px 20px 0;display:flex;align-items:center;gap:12px;}
.logo{width:54px;height:54px;background:linear-gradient(145deg,#2d72d2,#0d2954);border-radius:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 20px rgba(45,114,210,0.5);flex-shrink:0;}
.htxt{flex:1;}
.ttl{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2.5px;line-height:1;color:var(--bd);}
.stl{font-size:11px;color:var(--bb);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;margin-top:3px;}
.sob{background:none;border:1.5px solid var(--cbr);border-radius:10px;padding:8px;color:var(--tf);cursor:pointer;transition:all 0.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sob:hover{border-color:var(--bb);color:var(--bb);}
.sbar{display:flex;gap:9px;padding:15px 20px 4px;}
.sc{flex:1;background:var(--cb);border:1.5px solid var(--cbr);border-radius:12px;padding:10px 8px;text-align:center;backdrop-filter:blur(12px);box-shadow:var(--sh);}
.scc{cursor:pointer;transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s;}
.scc:hover{border-color:var(--bb);box-shadow:var(--shl);transform:translateY(-1px);}
.scc:active{transform:scale(0.97);}
.sn{font-family:'Bebas Neue',sans-serif;font-size:23px;color:var(--bb);line-height:1;}
.sl{font-size:9px;color:var(--tf);text-transform:uppercase;letter-spacing:0.7px;margin-top:2px;}
.ntabs{display:flex;gap:6px;padding:13px 20px 0;}
.ntab{flex:1;padding:9px 5px;border:1.5px solid var(--cbr);background:var(--cb);border-radius:var(--rs);color:var(--tf);font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;text-align:center;backdrop-filter:blur(10px);}
.ntab.active{background:linear-gradient(135deg,var(--bb),var(--bm));border-color:var(--bb);color:white;box-shadow:0 4px 14px rgba(45,114,210,0.35);}
.view{display:none;padding:15px 20px 0;}.view.active{display:block;}
.sectit{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--bd);margin-bottom:14px;}
.sw{position:relative;margin-bottom:13px;}
.si{width:100%;background:var(--ib);border:1.5px solid var(--cbr);border-radius:var(--rs);padding:11px 14px 11px 46px;color:var(--tm);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;box-shadow:var(--sh);}
.si:focus{border-color:var(--bb);}.si::placeholder{color:var(--tf);}
.sico{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:0.35;}
.bsel-wrap{position:relative;margin-bottom:13px;}
.bsel{width:100%;background:var(--ib);border:1.5px solid var(--cbr);border-radius:var(--rs);padding:11px 38px 11px 14px;color:var(--tm);font-size:14px;font-weight:600;font-family:"DM Sans",sans-serif;outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;box-shadow:var(--sh);transition:border-color 0.2s;}
.bsel:focus{border-color:var(--bb);}
.bsel-arrow{position:absolute;right:13px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--bb);}
.pc{background:var(--cb);border:1.5px solid var(--cbr);border-radius:var(--r);padding:13px;margin-bottom:10px;backdrop-filter:blur(12px);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:var(--sh);}
.pc:hover{box-shadow:var(--shl);border-color:rgba(45,114,210,0.32);transform:translateY(-1px);}
.pc:active{transform:scale(0.985);}
.pch{display:flex;align-items:flex-start;gap:11px;}
.pt{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--bm),var(--bb));display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;box-shadow:0 3px 10px rgba(45,114,210,0.28);}
.pt img{width:100%;height:100%;object-fit:cover;}
.pi{flex:1;min-width:0;}
.pb2{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--bb);font-weight:700;}
.pn{font-size:14px;font-weight:600;color:var(--tm);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.py{font-size:11px;color:var(--tf);margin-top:2px;}
.pst{display:flex;gap:2px;margin-top:5px;}
.star{font-size:13px;color:#cde0f8;}.star.filled{color:#f59e0b;}
.pnote{font-size:12px;color:var(--tf);margin-top:8px;font-style:italic;border-top:1px solid var(--cbr);padding-top:7px;line-height:1.4;}
.vbdg{background:linear-gradient(135deg,#059669,#10b981);border-radius:7px;padding:3px 8px;font-size:10px;font-weight:700;color:white;flex-shrink:0;}
.tag{display:inline-block;background:rgba(45,114,210,0.1);border:1px solid rgba(45,114,210,0.2);border-radius:6px;padding:2px 7px;font-size:10px;color:var(--ts);font-weight:600;margin-right:3px;margin-top:4px;}
.fg{margin-bottom:13px;}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--bb);font-weight:700;margin-bottom:6px;}
select,input[type="text"],textarea{width:100%;background:var(--ib);border:1.5px solid var(--cbr);border-radius:var(--rs);padding:11px 13px;color:var(--tm);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;appearance:none;-webkit-appearance:none;box-shadow:var(--sh);}
select:focus,input:focus,textarea:focus{border-color:var(--bb);}
select option{background:#e8f1fb;color:#0d2954;}
textarea{resize:none;min-height:78px;line-height:1.5;}
.stri{display:flex;gap:5px;}
.strbtn{background:none;border:none;font-size:29px;cursor:pointer;color:#c8d9ee;transition:color 0.15s,transform 0.1s;padding:2px;}
.strbtn.active{color:#f59e0b;}.strbtn:active{transform:scale(1.2);}
.pu{border:2px dashed var(--cbr);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;background:var(--cb);}
.pu:hover{border-color:var(--bb);background:rgba(45,114,210,0.05);}
.pu input{display:none;}
.puico{font-size:28px;margin-bottom:6px;}.putxt{font-size:12px;color:var(--tf);}
.pprev{width:100%;max-height:200px;object-fit:cover;border-radius:var(--rs);margin-top:10px;}
.pbtn{width:100%;padding:14px;background:linear-gradient(135deg,var(--bb),var(--bm));border:none;border-radius:var(--r);color:white;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.4px;box-shadow:0 5px 18px rgba(45,114,210,0.35);transition:opacity 0.2s,transform 0.1s;margin-top:8px;}
.pbtn:active{opacity:0.9;transform:scale(0.99);}
.sbtn{width:100%;padding:12px;background:transparent;border:1.5px solid var(--cbr);border-radius:var(--r);color:var(--tf);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:background 0.2s;}
.sbtn:active{background:rgba(45,114,210,0.07);}
.es{text-align:center;padding:56px 20px;color:var(--tf);}
.ei{font-size:46px;margin-bottom:12px;}.et{font-size:15px;line-height:1.6;}
.rsub{font-size:13px;color:var(--tf);margin-bottom:18px;line-height:1.6;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bb);color:white;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;z-index:100;white-space:nowrap;box-shadow:0 8px 24px rgba(45,114,210,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.mo{position:fixed;inset:0;background:rgba(13,41,84,0.45);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(6px);}
.mo.open{display:flex;}
.md{width:100%;max-width:480px;margin:0 auto;background:#d8eafd;border-radius:24px 24px 0 0;padding:22px 20px 40px;max-height:86vh;overflow-y:auto;border-top:1.5px solid rgba(45,114,210,0.2);box-shadow:0 -8px 40px rgba(13,41,84,0.18);}
.mh{width:40px;height:4px;background:rgba(45,114,210,0.25);border-radius:2px;margin:0 auto 18px;}
.mt{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--bd);margin-bottom:16px;}
.bn{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(228,241,252,0.97);backdrop-filter:blur(20px);border-top:1.5px solid rgba(45,114,210,0.14);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));max-width:480px;margin:0 auto;}
.bb2{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;background:none;border:none;color:var(--tf);cursor:pointer;transition:color 0.2s;font-family:'DM Sans',sans-serif;}
.bb2.active{color:var(--bb);}
.bb2 span{font-size:10px;font-weight:600;}
</style>

// ── IMAGE DB (IndexedDB + compression) ───────────────────────
// Photos compressed to max 800px JPEG 75% quality — saves space locally.
let imageDB=null;
function openIDB(){return new Promise(r=>{const q=indexedDB.open('PVImg',1);q.onupgradeneeded=e=>e.target.result.createObjectStore('photos');q.onsuccess=e=>{imageDB=e.target.result;r(imageDB);};q.onerror=()=>r(null);});}
async function saveImg(k,d){if(!imageDB)return;return new Promise(r=>{const t=imageDB.transaction('photos','readwrite');t.objectStore('photos').put(d,k);t.oncomplete=()=>r(true);t.onerror=()=>r(false);});}
async function loadImg(k){if(!imageDB||!k)return null;return new Promise(r=>{const t=imageDB.transaction('photos','readonly');const q=t.objectStore('photos').get(k);q.onsuccess=()=>r(q.result||null);q.onerror=()=>r(null);});}
async function delImg(k){if(!imageDB||!k)return;return new Promise(r=>{const t=imageDB.transaction('photos','readwrite');t.objectStore('photos').delete(k);t.oncomplete=()=>r();});}
function imgKey(id){return`pv_${currentUser?currentUser.uid:'guest'}_${id}`;}
function compressImage(dataURL){return new Promise(res=>{const img=new Image();img.onload=()=>{const MAX=800;let w=img.width,h=img.height;if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.75));};img.src=dataURL;});}

// ── AUTH ──────────────────────────────────────────────────────
function swTab(t){
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-signup').classList.toggle('active',t==='signup');
  document.getElementById('form-login').style.display=t==='login'?'block':'none';
  document.getElementById('form-signup').style.display=t==='signup'?'block':'none';
  document.getElementById('lerr').textContent='';document.getElementById('serr').textContent='';
}
async function signInWithGoogle(){try{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());}catch(e){document.getElementById('lerr').textContent=authErr(e.code);}}
async function doSignIn(){
  const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;
  document.getElementById('lerr').textContent='';
  if(!e||!p){document.getElementById('lerr').textContent='Please enter email and password.';return;}
  try{await auth.signInWithEmailAndPassword(e,p);}catch(err){document.getElementById('lerr').textContent=authErr(err.code);}
}
async function doSignUp(){
  const n=document.getElementById('sn2').value.trim(),e=document.getElementById('se').value.trim(),p=document.getElementById('sp').value;
  document.getElementById('serr').textContent='';
  if(!n||!e||!p){document.getElementById('serr').textContent='All fields required.';return;}
  if(p.length<6){document.getElementById('serr').textContent='Password must be at least 6 characters.';return;}
  try{const c=await auth.createUserWithEmailAndPassword(e,p);await c.user.updateProfile({displayName:n});}catch(err){document.getElementById('serr').textContent=authErr(err.code);}
}
function guestIn(){isGuest=true;currentUser=null;showApp('Guest');}
function doSignOut(){if(isGuest){isGuest=false;currentUser=null;collection=[];collData={};reports=[];customPaddles=[];document.getElementById('main-app').style.display='none';document.getElementById('auth-screen').style.display='flex';return;}auth.signOut();}
auth.onAuthStateChanged(u=>{if(u){isGuest=false;currentUser=u;showApp(u.displayName||u.email.split('@')[0]);loadData();}else if(!isGuest){document.getElementById('auth-screen').style.display='flex';document.getElementById('main-app').style.display='none';}});
function showApp(n){document.getElementById('auth-screen').style.display='none';document.getElementById('main-app').style.display='block';document.getElementById('greet').textContent=`Hi, ${n}`;init();}
function authErr(c){const m={'auth/user-not-found':'No account found with that email.','auth/wrong-password':'Incorrect password.','auth/invalid-credential':'Incorrect email or password.','auth/email-already-in-use':'An account with that email already exists.','auth/invalid-email':'Please enter a valid email address.','auth/too-many-requests':'Too many attempts. Please try again later.','auth/popup-closed-by-user':'Sign-in popup was closed.','auth/network-request-failed':'Network error. Check your connection.'};return m[c]||'Something went wrong. Please try again.';}
document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;if(document.getElementById('auth-screen').style.display==='none')return;document.getElementById('form-login').style.display!=='none'?doSignIn():doSignUp();});

// ── DATA ──────────────────────────────────────────────────────
async function loadData(){
  if(isGuest){collection=JSON.parse(localStorage.getItem('pv_c')||'[]');collData=JSON.parse(localStorage.getItem('pv_d')||'{}');reports=JSON.parse(localStorage.getItem('pv_r')||'[]');customPaddles=JSON.parse(localStorage.getItem('pv_cp')||'[]');updateStats();if(currentView==='collection')renderColl();if(currentView==='browse')renderP();return;}
  try{const s=await db.collection('users').doc(currentUser.uid).get();if(s.exists){const d=s.data();collection=d.collection||[];collData=d.collData||{};reports=d.reports||[];customPaddles=d.customPaddles||[];}updateStats();if(currentView==='collection')renderColl();if(currentView==='browse')renderP();}
  catch(e){console.warn('Firestore load failed',e);collection=JSON.parse(localStorage.getItem('pv_c')||'[]');collData=JSON.parse(localStorage.getItem('pv_d')||'{}');reports=JSON.parse(localStorage.getItem('pv_r')||'[]');customPaddles=JSON.parse(localStorage.getItem('pv_cp')||'[]');updateStats();}
}
async function saveData(){
  localStorage.setItem('pv_c',JSON.stringify(collection));localStorage.setItem('pv_d',JSON.stringify(collData));localStorage.setItem('pv_r',JSON.stringify(reports));localStorage.setItem('pv_cp',JSON.stringify(customPaddles));
  if(isGuest||!currentUser)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{try{await db.collection('users').doc(currentUser.uid).set({collection,collData,reports,customPaddles,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(e){console.error('Firestore save error',e);}},800);
}

async function init(){await openIDB();buildFilters();buildSelects();renderP();updateStats();}

function buildFilters(){
  const sel=document.getElementById('brand-filters-sel');
  sel.innerHTML='<option value="All">All Brands ('+allP().length+')</option>';
  [...new Set(PADDLES.map(p=>p.brand))].sort().forEach(b=>{
    const count=allP().filter(x=>x.brand===b).length;
    const o=document.createElement('option');
    o.value=b;o.textContent=b+' ('+count+')';
    sel.appendChild(o);
  });
}
function setBFSel(val){
  activeBrandFilter=val;
  clearTimeout(_fTimer);
  renderP();
}
function buildSelects(){
  ['cb','rb'].forEach(id=>{const s=document.getElementById(id);s.innerHTML='<option value="">Select brand…</option>';BRANDS.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;s.appendChild(o);});});
  ['cy','ry'].forEach(id=>{const s=document.getElementById(id);s.innerHTML='<option value="">Select year…</option>';for(let y=2026;y>=2014;y--){const o=document.createElement('option');o.value=y;o.textContent=y;s.appendChild(o);}});
}
function showView(n){
  currentView=n;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bb2').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+n).classList.add('active');document.getElementById('nav-'+n).classList.add('active');
  ['browse','collection','add','report'].forEach((v,i)=>{if(v===n)document.querySelectorAll('.ntab')[i]?.classList.add('active');});
  if(n==='collection')renderColl();if(n==='report')renderRep();if(n==='browse'){clearTimeout(_fTimer);renderP();}
}
function setBF(b){activeBrandFilter=b;const sel=document.getElementById('brand-filters-sel');if(sel)sel.value=b;renderP();}
let _fTimer;function filterP(q){searchQuery=q.toLowerCase();clearTimeout(_fTimer);_fTimer=setTimeout(renderP,150);}
let _allPCache=null;
function allP(){if(_allPCache&&!customPaddles.length)return _allPCache;const r=[...PADDLES,...customPaddles.map((p,i)=>({...p,id:'c'+i,tags:['Custom']}))];r.sort((a,b)=>a.brand==='CRBN'?-1:b.brand==='CRBN'?1:a.brand.localeCompare(b.brand));if(!customPaddles.length)_allPCache=r;return r;}
function invalidateCache(){_allPCache=null;}

function renderP(){
  const l=document.getElementById('paddle-list');
  let p=allP();
  if(activeBrandFilter!=='All')p=p.filter(x=>x.brand===activeBrandFilter);
  if(searchQuery){const q=searchQuery;p=p.filter(x=>x.brand.toLowerCase().includes(q)||x.model.toLowerCase().includes(q)||(x.tags||[]).some(t=>t.toLowerCase().includes(q))||String(x.year).includes(q));}
  if(!p.length){l.innerHTML='<div class="es"><div class="ei">🔍</div><div class="et">No paddles found</div></div>';return;}
  l.innerHTML=p.map(x=>pCard(x)).join('');
  p.forEach(x=>{const d=collData[x.id];if(d?.photoKey)loadAndShow(x.id,d.photoKey);});
}
async function loadAndShow(id,k){const imgs=document.querySelectorAll(`[data-pt="${id}"]`);if(!imgs.length)return;const s=await loadImg(k);if(s){imgs.forEach(img=>{img.src=s;img.style.display='block';}); }}
function pCard(p){
  const ic=collection.includes(p.id),d=collData[p.id];
  return`<div class="pc" onclick="openD(${JSON.stringify(p.id)})"><div class="pch">
    <div class="pt">${d?.photoKey?`<img data-pt="${p.id}" style="display:none;width:100%;height:100%;object-fit:cover;" src="">`:
      `<svg width="100%" height="100%" viewBox="0 0 24 44" fill="none" preserveAspectRatio="xMidYMid meet"><g transform="translate(-2.95,3.58) rotate(15,12,24)"><ellipse cx="12" cy="9" rx="10.7" ry="13.2" fill="#0d2954" opacity="0.55"/><ellipse cx="12" cy="9" rx="9.5" ry="12" fill="#111111" opacity="0.5"/><rect x="8.2" y="21.5" width="7.6" height="18.5" rx="2.2" fill="#0d2954" opacity="0.6"/></g></svg>`}</div>
    <div class="pi"><div class="pb2">${p.brand}</div><div class="pn">${p.model}</div>
      <div class="py">${p.year}${p.surface?' · '+p.surface:''}${p.shape?' · '+p.shape:''}</div>
      <div class="pst">${stars(d?.rating||0)}</div></div>
    ${ic?'<span class="vbdg">✓ Vault</span>':''}</div>
    <div>${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    ${d?.notes?`<div class="pnote">"${d.notes}"</div>`:''}</div>`;
}
function stars(r){let h='';for(let i=1;i<=5;i++)h+=`<span class="star ${i<=r?'filled':''}">★</span>`;return h;}
async function renderColl(){
  const l=document.getElementById('collection-list');
  if(!collection.length){l.innerHTML=`<div class="es"><div class="ei">🏓</div><div class="et">Your vault is empty.<br>Browse paddles and add them!</div></div>`;return;}
  const all=allP();l.innerHTML=collection.map(id=>{const p=all.find(x=>x.id==id);return p?pCard(p):'';}).join('');
  collection.forEach(id=>{const d=collData[id];if(d?.photoKey)loadAndShow(id,d.photoKey);});
}
function closeStatM(){document.getElementById('stat-modal').classList.remove('open');}

function showStatView(type){
  const all=allP();
  let html='';
  if(type==='all'){
    html='<div class="mt">ALL PADDLES ('+all.length+')</div>';
    const brands=[...new Set(all.map(p=>p.brand))].sort();
    brands.forEach(b=>{
      const bp=all.filter(p=>p.brand===b);
      html+='<div class="sectit" style="font-size:13px;margin:14px 0 4px;">'+b+' ('+bp.length+')</div>';
      bp.forEach(p=>{
        const pid=typeof p.id==='number'?p.id:'"'+p.id+'"';
        html+='<div class="sv-item" data-action="paddle" data-pid="'+p.id+'" style="padding:7px 0;border-bottom:1px solid var(--cbr);cursor:pointer;">'
          +'<div style="font-size:13px;font-weight:600;color:var(--tm);">'+p.model+'</div>'
          +'<div style="font-size:11px;color:var(--tf);">'+p.year+(p.surface?' · '+p.surface:'')+'</div>'
          +'</div>';
      });
    });
  } else if(type==='brands'){
    const brands=[...new Set(all.map(p=>p.brand))].sort();
    html='<div class="mt">ALL BRANDS ('+brands.length+')</div>';
    brands.forEach(b=>{
      const count=all.filter(p=>p.brand===b).length;
      const inVault=collection.filter(id=>all.find(p=>p.id==id&&p.brand===b)).length;
      html+='<div class="sv-item" data-action="brand" data-brand="'+b+'" style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--cbr);cursor:pointer;">'
        +'<div><div style="font-size:14px;font-weight:600;color:var(--tm);">'+b+'</div>'
        +'<div style="font-size:11px;color:var(--tf);">'+count+' paddle'+(count!==1?'s':'')+(inVault?' · '+inVault+' in your vault':'')+'</div></div>'
        +'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.3;flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>'
        +'</div>';
    });
  } else if(type==='ratings'){
    const rated=collection.map(id=>{const p=all.find(x=>x.id==id);const d=collData[id];return p&&d&&d.rating>0?{p,d}:null;}).filter(Boolean).sort((a,b)=>b.d.rating-a.d.rating);
    const unrated=collection.map(id=>{const p=all.find(x=>x.id==id);const d=collData[id];return p&&(!d||!d.rating)?p:null;}).filter(Boolean);
    html='<div class="mt">RATINGS</div>';
    if(!collection.length){
      html+='<div class="es"><div class="ei">⭐</div><div class="et">Add paddles to your vault<br>and rate them to see rankings.</div></div>';
    } else {
      if(rated.length){
        rated.forEach(({p,d})=>{
          html+='<div class="sv-item" data-action="paddle" data-pid="'+p.id+'" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--cbr);cursor:pointer;">'
            +'<div style="font-size:20px;font-weight:700;color:var(--bb);width:24px;text-align:center;flex-shrink:0;">'+d.rating+'</div>'
            +'<div style="flex:1;min-width:0;">'
            +'<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--bb);font-weight:700;">'+p.brand+'</div>'
            +'<div style="font-size:13px;font-weight:600;color:var(--tm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+p.model+'</div>'
            +'<div style="font-size:12px;color:#f59e0b;">'+['','★','★★','★★★','★★★★','★★★★★'][d.rating]+'</div>'
            +'</div></div>';
        });
      }
      if(unrated.length){
        html+='<div style="font-size:11px;color:var(--tf);text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;">Unrated ('+unrated.length+')</div>';
        unrated.forEach(p=>{
          html+='<div class="sv-item" data-action="paddle" data-pid="'+p.id+'" style="padding:8px 0;border-bottom:1px solid var(--cbr);cursor:pointer;">'
            +'<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--bb);font-weight:700;">'+p.brand+'</div>'
            +'<div style="font-size:13px;font-weight:600;color:var(--tm);">'+p.model+'</div>'
            +'</div>';
        });
      }
    }
  }
  const smc=document.getElementById('smc');
  smc.innerHTML=html;
  // Delegated click handler — no inline onclick needed
  smc.querySelectorAll('.sv-item').forEach(el=>{
    el.addEventListener('click',()=>{
      const action=el.dataset.action;
      if(action==='paddle'){
        const pid=isNaN(el.dataset.pid)?el.dataset.pid:Number(el.dataset.pid);
        closeStatM();setTimeout(()=>openD(pid),220);
      } else if(action==='brand'){
        closeStatM();
        setTimeout(()=>{setBFByName(el.dataset.brand);showView('browse');},220);
      }
    });
  });
  document.getElementById('stat-modal').classList.add('open');
}

function setBFByName(b){
  activeBrandFilter=b;
  const sel=document.getElementById('brand-filters-sel');
  if(sel)sel.value=b;
  renderP();
}

function updateStats(){
  document.getElementById('sc0').textContent=collection.length;
  const all=allP();document.getElementById('sc1').textContent=all.length;document.getElementById('sc2').textContent=new Set(all.map(p=>p.brand)).size;
  const r=collection.map(id=>collData[id]?.rating).filter(x=>x>0);
  document.getElementById('sc3').textContent=r.length?(r.reduce((a,b)=>a+b,0)/r.length).toFixed(1):'—';
}

// ── DETAIL MODAL ──────────────────────────────────────────────
async function openD(pid){
  const p=allP().find(x=>x.id==pid);if(!p)return;
  const ic=collection.includes(pid),d=collData[pid]||{rating:0,notes:'',photoKey:null};
  window._mR=d.rating;window._mPK=d.photoKey||null;window._mNP=null;
  let src=null;if(d.photoKey)src=await loadImg(d.photoKey);
  const th=src?`<img src="${src}" style="width:100%;height:100%;object-fit:cover;">`:`<svg width="100%" height="100%" viewBox="0 0 24 44" fill="none" preserveAspectRatio="xMidYMid meet"><g transform="translate(-2.95,3.58) rotate(15,12,24)"><ellipse cx="12" cy="9" rx="10.7" ry="13.2" fill="#0d2954" opacity="0.65"/><ellipse cx="12" cy="9" rx="9.5" ry="12" fill="#111111" opacity="0.65"/><rect x="8.2" y="21.5" width="7.6" height="18.5" rx="2.2" fill="#0d2954" opacity="0.7"/></g></svg>`;
  document.getElementById('mc').innerHTML=`
    <div class="mt">${p.model}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div class="pt" style="width:66px;height:66px;border-radius:12px;">${th}</div>
      <div><div class="pb2" style="font-size:12px;">${p.brand}</div>
        <div style="font-size:14px;font-weight:600;color:var(--tm);margin-top:2px;">${p.year}${p.surface?' · '+p.surface:''}</div>
        ${p.shape?`<div style="font-size:11px;color:var(--tf);margin-top:1px;">${p.shape} shape</div>`:''}
        <div>${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div></div></div>
    <hr style="border:none;border-top:1px solid var(--cbr);margin:13px 0;">
    <div class="fg"><label>Your Rating</label><div class="stri" id="mstars">
      ${[1,2,3,4,5].map(i=>`<button class="strbtn ${i<=d.rating?'active':''}" onclick="setMR(${JSON.stringify(pid)},${i})">★</button>`).join('')}</div></div>
    <div class="fg"><label>Notes</label><textarea id="mnotes" placeholder="Your thoughts…">${d.notes||''}</textarea></div>
    <div class="fg"><label>Photo <span style="font-size:10px;color:var(--tf);font-weight:400;text-transform:none;">(synced to cloud)</span></label>
      <label class="pu" for="mpf"><input type="file" id="mpf" accept="image/*" onchange="prevMP(this)">
      <div class="puico">📷</div><div class="putxt">Upload your own photo</div>
      ${src?`<img src="${src}" class="pprev" id="mpprev">`:'<img class="pprev" id="mpprev" style="display:none">'}</label></div>
    <button class="pbtn" onclick="saveMD(${JSON.stringify(pid)},${ic})">${ic?'💾 Save Changes':'+ Add to My Vault'}</button>
    ${ic?`<button class="sbtn" style="color:#dc2626;border-color:#fca5a5;" onclick="remV(${JSON.stringify(pid)})">Remove from Vault</button>`:''}
  `;
  document.getElementById('modal').classList.add('open');
}
function setMR(pid,v){window._mR=v;document.querySelectorAll('#mstars .strbtn').forEach((b,i)=>b.classList.toggle('active',i<v));}
function prevMP(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{const compressed=await compressImage(e.target.result);window._mNP=compressed;const i=document.getElementById('mpprev');if(i){i.src=compressed;i.style.display='block';}};r.readAsDataURL(f);}
async function saveMD(pid,was){
  const n=document.getElementById('mnotes').value;
  let k=collData[pid]?.photoKey||null;
  if(window._mNP){k=imgKey(pid);await saveImg(k,window._mNP);}
  collData[pid]={rating:window._mR||0,notes:n,photoKey:k};
  if(!was)collection.push(pid);
  updateStats();closeM();await saveData();showT(was?'💾 Changes saved':'🏓 Added to your Vault!');
  if(currentView==='collection')renderColl();if(currentView==='browse')renderP();
}
async function remV(pid){
  collection=collection.filter(id=>id!=pid);
  if(collData[pid]?.photoKey)await delImg(collData[pid].photoKey);delete collData[pid];
  updateStats();closeM();await saveData();showT('Removed from Vault');
  if(currentView==='collection')renderColl();if(currentView==='browse')renderP();
}
function closeM(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeM();});
document.getElementById('stat-modal').addEventListener('click',function(e){if(e.target===this)closeStatM();});

// ── CUSTOM ────────────────────────────────────────────────────
function setR(v){customRating=v;document.querySelectorAll('#custom-stars .strbtn').forEach((b,i)=>b.classList.toggle('active',i<v));}
function onCB(){document.getElementById('cb-other').style.display=document.getElementById('cb').value==='Other'?'block':'none';}
function onRB(){document.getElementById('rb-other').style.display=document.getElementById('rb').value==='Other'?'block':'none';}
function prevPhoto(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=async e=>{const compressed=await compressImage(e.target.result);customPhotoData=compressed;const i=document.getElementById('cprev');i.src=compressed;i.style.display='block';};r.readAsDataURL(f);}
async function saveCustom(){
  const brand=document.getElementById('cb').value,ob=document.getElementById('cbo').value;
  const model=document.getElementById('cm').value.trim(),year=document.getElementById('cy').value;
  const notes=document.getElementById('cn').value.trim();
  const fb=brand==='Other'?ob.trim():brand;
  if(!fb||!model){showT('⚠️ Brand and model required');return;}
  customPaddles.push({brand:fb,model,year:parseInt(year)||2024,surface:'Custom',notes,rating:customRating});invalidateCache();
  const pid='c'+(customPaddles.length-1);collection.push(pid);
  let k=null;if(customPhotoData){k=imgKey(pid);await saveImg(k,customPhotoData);}
  collData[pid]={rating:customRating,notes,photoKey:k};
  updateStats();clearCustom();await saveData();showT('🎉 Paddle saved to your Vault!');showView('collection');
}
function clearCustom(){['cb','cm','cy','cn','cbo'].forEach(id=>document.getElementById(id).value='');document.getElementById('cb-other').style.display='none';document.getElementById('cprev').style.display='none';document.getElementById('cpf').value='';customRating=0;customPhotoData=null;document.querySelectorAll('#custom-stars .strbtn').forEach(b=>b.classList.remove('active'));}

// ── REPORTS ───────────────────────────────────────────────────
async function submitReport(){
  const brand=document.getElementById('rb').value,ob=document.getElementById('rbo').value;
  const model=document.getElementById('rm').value.trim(),year=document.getElementById('ry').value;
  const details=document.getElementById('rd').value.trim();
  const fb=brand==='Other'?ob.trim():brand;
  if(!fb||!model){showT('⚠️ Brand and model required');return;}
  reports.push({brand:fb,model,year,details,date:new Date().toLocaleDateString()});
  ['rb','rm','ry','rd','rbo'].forEach(id=>document.getElementById(id).value='');document.getElementById('rb-other').style.display='none';
  await saveData();showT('✓ Report submitted. Thank you!');renderRep();
}
function renderRep(){
  const l=document.getElementById('reports-list');
  if(!reports.length){l.innerHTML='';return;}
  l.innerHTML=`<div class="sectit" style="margin-top:8px;">YOUR REPORTS</div>`+reports.map(r=>`<div class="pc" style="cursor:default;"><div class="pb2">${r.brand}</div><div class="pn">${r.model}</div><div class="py">${r.year?r.year+' · ':''}Reported ${r.date}</div>${r.details?`<div class="pnote">${r.details}</div>`:''}</div>`).join('');
}

// ── TOAST ─────────────────────────────────────────────────────
let tTimer;
function showT(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tTimer);tTimer=setTimeout(()=>t.classList.remove('show'),2300);}

</script>
</body>
</html>
