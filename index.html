<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Paddle Vault — Pickleball Collection Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --blue-deep:#0d2954;--blue-mid:#1a4b8c;--blue-bright:#2d72d2;
  --blue-light:#74b0f5;--blue-pale:#c8dffc;
  --text-main:#0d2954;--text-mid:#2d5a9e;--text-soft:#6b92c4;
  --card-bg:rgba(255,255,255,0.72);--card-border:rgba(45,114,210,0.18);
  --input-bg:rgba(255,255,255,0.92);
  --shadow:0 4px 18px rgba(13,41,84,0.11);--shadow-lg:0 8px 30px rgba(13,41,84,0.17);
  --radius:16px;--radius-sm:10px;
}
body{font-family:'DM Sans',sans-serif;background:#d8eafd;color:var(--text-main);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 90% 55% at 15% -5%,rgba(116,176,245,0.55) 0%,transparent 55%),
  radial-gradient(ellipse 70% 50% at 85% 105%,rgba(45,114,210,0.25) 0%,transparent 55%),
  linear-gradient(160deg,#c4dcfb 0%,#d8eafd 35%,#e8f3ff 70%,#f0f7ff 100%);}

/* AUTH */
.auth-screen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse 90% 55% at 15% -5%,rgba(116,176,245,0.55) 0%,transparent 55%),
  radial-gradient(ellipse 70% 50% at 85% 105%,rgba(45,114,210,0.25) 0%,transparent 55%),
  linear-gradient(160deg,#c4dcfb 0%,#d8eafd 35%,#e8f3ff 70%,#f0f7ff 100%);}
.auth-card{background:rgba(255,255,255,0.88);border:1.5px solid var(--card-border);border-radius:24px;padding:32px 28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(13,41,84,0.18);backdrop-filter:blur(20px);}
.auth-logo{width:68px;height:68px;background:linear-gradient(145deg,#2d72d2,#0d2954);border-radius:20px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(45,114,210,0.45);}
.auth-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;text-align:center;color:var(--blue-deep);margin-bottom:4px;}
.auth-sub{text-align:center;font-size:12px;color:var(--text-soft);text-transform:uppercase;letter-spacing:1.2px;font-weight:600;margin-bottom:24px;}
.google-btn{width:100%;padding:13px 16px;display:flex;align-items:center;justify-content:center;gap:10px;background:white;border:1.5px solid #dadce0;border-radius:var(--radius);color:#3c4043;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:box-shadow 0.2s,background 0.2s;margin-bottom:4px;}
.google-btn:hover{box-shadow:0 2px 8px rgba(0,0,0,0.12);background:#f8f9fa;}
.auth-divider{display:flex;align-items:center;gap:12px;margin:14px 0;color:var(--text-soft);font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--card-border);}
.auth-tabs{display:flex;border:1.5px solid var(--card-border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:22px;}
.auth-tab{flex:1;padding:10px;background:transparent;border:none;color:var(--text-soft);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;}
.auth-tab.active{background:linear-gradient(135deg,var(--blue-bright),var(--blue-mid));color:white;}
.auth-field{margin-bottom:14px;}
.auth-field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--blue-bright);font-weight:700;margin-bottom:5px;}
.auth-field input{width:100%;background:var(--input-bg);border:1.5px solid var(--card-border);border-radius:var(--radius-sm);padding:11px 13px;color:var(--text-main);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;}
.auth-field input:focus{border-color:var(--blue-bright);}
.auth-error{font-size:12px;color:#dc2626;margin-bottom:8px;min-height:16px;text-align:center;}
.auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue-bright),var(--blue-mid));border:none;border-radius:var(--radius);color:white;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.4px;box-shadow:0 5px 18px rgba(45,114,210,0.35);transition:opacity 0.2s;margin-top:4px;}
.auth-btn:active{opacity:0.9;}
.auth-btn-ghost{width:100%;padding:12px;background:transparent;border:1.5px solid var(--card-border);border-radius:var(--radius);color:var(--text-soft);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:background 0.2s;}
.auth-btn-ghost:active{background:rgba(45,114,210,0.07);}

/* APP */
#app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:104px;}
.app-header{padding:20px 20px 0;display:flex;align-items:center;gap:12px;}
.logo-icon{width:54px;height:54px;background:linear-gradient(145deg,#2d72d2,#0d2954);border-radius:15px;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 20px rgba(45,114,210,0.5);flex-shrink:0;}
.header-text{flex:1;}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2.5px;line-height:1;color:var(--blue-deep);}
.app-subtitle{font-size:11px;color:var(--blue-bright);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;margin-top:3px;}
.sign-out-btn{background:none;border:1.5px solid var(--card-border);border-radius:10px;padding:8px;color:var(--text-soft);cursor:pointer;transition:all 0.2s;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sign-out-btn:hover{border-color:var(--blue-bright);color:var(--blue-bright);}
.stats-bar{display:flex;gap:9px;padding:15px 20px 4px;}
.stat-chip{flex:1;background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:12px;padding:10px 8px;text-align:center;backdrop-filter:blur(12px);box-shadow:var(--shadow);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:23px;color:var(--blue-bright);line-height:1;}
.stat-label{font-size:9px;color:var(--text-soft);text-transform:uppercase;letter-spacing:0.7px;margin-top:2px;}
.nav-tabs{display:flex;gap:6px;padding:13px 20px 0;}
.nav-tab{flex:1;padding:9px 5px;border:1.5px solid var(--card-border);background:var(--card-bg);border-radius:var(--radius-sm);color:var(--text-soft);font-size:11px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all 0.2s;text-align:center;backdrop-filter:blur(10px);}
.nav-tab.active{background:linear-gradient(135deg,var(--blue-bright),var(--blue-mid));border-color:var(--blue-bright);color:white;box-shadow:0 4px 14px rgba(45,114,210,0.35);}
.view{display:none;padding:15px 20px 0;}.view.active{display:block;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1.5px;color:var(--blue-deep);margin-bottom:14px;}
.search-wrap{position:relative;margin-bottom:13px;}
.search-input{width:100%;background:var(--input-bg);border:1.5px solid var(--card-border);border-radius:var(--radius-sm);padding:11px 14px 11px 42px;color:var(--text-main);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;box-shadow:var(--shadow);}
.search-input:focus{border-color:var(--blue-bright);}
.search-input::placeholder{color:var(--text-soft);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:0.4;}
.filter-row{display:flex;gap:7px;margin-bottom:13px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:5px 12px;border:1.5px solid var(--card-border);border-radius:20px;background:var(--card-bg);color:var(--text-mid);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;white-space:nowrap;backdrop-filter:blur(8px);}
.filter-chip.active{background:var(--blue-bright);border-color:var(--blue-bright);color:white;}
.paddle-card{background:var(--card-bg);border:1.5px solid var(--card-border);border-radius:var(--radius);padding:13px;margin-bottom:10px;backdrop-filter:blur(12px);cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:var(--shadow);}
.paddle-card:hover{box-shadow:var(--shadow-lg);border-color:rgba(45,114,210,0.32);transform:translateY(-1px);}
.paddle-card:active{transform:scale(0.985);}
.paddle-card-header{display:flex;align-items:flex-start;gap:11px;}
.paddle-thumb{width:52px;height:52px;border-radius:10px;background:linear-gradient(135deg,var(--blue-mid),var(--blue-bright));display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;box-shadow:0 3px 10px rgba(45,114,210,0.28);}
.paddle-thumb img{width:100%;height:100%;object-fit:cover;}
.paddle-info{flex:1;min-width:0;}
.paddle-brand{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--blue-bright);font-weight:700;}
.paddle-name{font-size:14px;font-weight:600;color:var(--text-main);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.paddle-year{font-size:11px;color:var(--text-soft);margin-top:2px;}
.paddle-stars{display:flex;gap:2px;margin-top:5px;}
.star{font-size:13px;color:#cde0f8;}.star.filled{color:#f59e0b;}
.paddle-note{font-size:12px;color:var(--text-soft);margin-top:8px;font-style:italic;border-top:1px solid var(--card-border);padding-top:7px;line-height:1.4;}
.in-collection-badge{background:linear-gradient(135deg,#059669,#10b981);border-radius:7px;padding:3px 8px;font-size:10px;font-weight:700;color:white;flex-shrink:0;}
.tag{display:inline-block;background:rgba(45,114,210,0.1);border:1px solid rgba(45,114,210,0.2);border-radius:6px;padding:2px 7px;font-size:10px;color:var(--text-mid);font-weight:600;margin-right:3px;margin-top:4px;}
.form-group{margin-bottom:13px;}
label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--blue-bright);font-weight:700;margin-bottom:6px;}
select,input[type="text"],textarea{width:100%;background:var(--input-bg);border:1.5px solid var(--card-border);border-radius:var(--radius-sm);padding:11px 13px;color:var(--text-main);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color 0.2s;appearance:none;-webkit-appearance:none;box-shadow:var(--shadow);}
select:focus,input:focus,textarea:focus{border-color:var(--blue-bright);}
select option{background:#e8f1fb;color:#0d2954;}
textarea{resize:none;min-height:78px;line-height:1.5;}
.star-input{display:flex;gap:5px;}
.star-btn{background:none;border:none;font-size:29px;cursor:pointer;color:#c8d9ee;transition:color 0.15s,transform 0.1s;padding:2px;}
.star-btn.active{color:#f59e0b;}.star-btn:active{transform:scale(1.2);}
.photo-upload{border:2px dashed var(--card-border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color 0.2s,background 0.2s;background:var(--card-bg);}
.photo-upload:hover{border-color:var(--blue-bright);background:rgba(45,114,210,0.05);}
.photo-upload input{display:none;}
.photo-upload-icon{font-size:28px;margin-bottom:6px;}.photo-upload-text{font-size:12px;color:var(--text-soft);}
.photo-preview{width:100%;max-height:200px;object-fit:cover;border-radius:var(--radius-sm);margin-top:10px;}
.primary-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--blue-bright),var(--blue-mid));border:none;border-radius:var(--radius);color:white;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:0.4px;box-shadow:0 5px 18px rgba(45,114,210,0.35);transition:opacity 0.2s,transform 0.1s;margin-top:8px;}
.primary-btn:active{opacity:0.9;transform:scale(0.99);}
.secondary-btn{width:100%;padding:12px;background:transparent;border:1.5px solid var(--card-border);border-radius:var(--radius);color:var(--text-soft);font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;transition:background 0.2s;}
.secondary-btn:active{background:rgba(45,114,210,0.07);}
.empty-state{text-align:center;padding:56px 20px;color:var(--text-soft);}
.empty-icon{font-size:46px;margin-bottom:12px;}.empty-text{font-size:15px;line-height:1.6;}
.report-subtitle{font-size:13px;color:var(--text-soft);margin-bottom:18px;line-height:1.6;}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--blue-bright);color:white;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:700;opacity:0;transition:all 0.3s;z-index:100;white-space:nowrap;box-shadow:0 8px 24px rgba(45,114,210,0.4);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.modal-overlay{position:fixed;inset:0;background:rgba(13,41,84,0.45);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(6px);}
.modal-overlay.open{display:flex;}
.modal{width:100%;max-width:480px;margin:0 auto;background:#d8eafd;border-radius:24px 24px 0 0;padding:22px 20px 40px;max-height:86vh;overflow-y:auto;border-top:1.5px solid rgba(45,114,210,0.2);box-shadow:0 -8px 40px rgba(13,41,84,0.18);}
.modal-handle{width:40px;height:4px;background:rgba(45,114,210,0.25);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1.5px;color:var(--blue-deep);margin-bottom:16px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(228,241,252,0.97);backdrop-filter:blur(20px);border-top:1.5px solid rgba(45,114,210,0.14);display:flex;padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));max-width:480px;margin:0 auto;}
.bottom-nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;background:none;border:none;color:var(--text-soft);cursor:pointer;transition:color 0.2s;font-family:'DM Sans',sans-serif;}
.bottom-nav-btn.active{color:var(--blue-bright);}
.bottom-nav-btn span{font-size:10px;font-weight:600;}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <path d="M17 2 C11.5 2 7 6.2 7 12 C7 18.5 10 24 17 26 C24 24 27 18.5 27 12 C27 6.2 22.5 2 17 2 Z" fill="white" opacity="0.96"/>
        <path d="M13.5 26 Q13 28.5 14 29.5 L14 43 Q15.5 44.5 17 44.5 Q18.5 44.5 20 43 L20 29.5 Q21 28.5 20.5 26 Z" fill="#1a4b8c"/>
        <line x1="14.3" y1="32" x2="19.7" y2="32" stroke="#74b0f5" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
        <line x1="14.3" y1="35.5" x2="19.7" y2="35.5" stroke="#74b0f5" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
        <line x1="14.3" y1="39" x2="19.7" y2="39" stroke="#74b0f5" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
        <rect x="13.5" y="42" width="7" height="2.5" rx="1.2" fill="rgba(196,220,251,0.9)"/>
        <circle cx="34" cy="11" r="8.5" fill="#fbbf24"/>
        <circle cx="31.5" cy="8.5" r="2.2" fill="rgba(255,255,255,0.25)"/>
        <circle cx="34" cy="4.2" r="1.15" fill="rgba(150,75,0,0.58)"/>
        <circle cx="38.2" cy="6.2" r="1.15" fill="rgba(150,75,0,0.58)"/>
        <circle cx="40.5" cy="10.5" r="1.15" fill="rgba(150,75,0,0.58)"/>
        <circle cx="38.5" cy="15" r="1.15" fill="rgba(150,75,0,0.58)"/>
        <circle cx="34" cy="17.8" r="1.15" fill="rgba(150,75,0,0.58)"/>
        <circle cx="29.5" cy="15.5" r="1.15" fill="rgba(150,75,0,0.58)"/>
        <circle cx="27.5" cy="11" r="1.15" fill="rgba(150,75,0,0.58)"/>
        <circle cx="29.8" cy="6.5" r="1.15" fill="rgba(150,75,0,0.58)"/>
        <circle cx="34" cy="11" r="1.0" fill="rgba(150,75,0,0.52)"/>
      </svg>
    </div>
    <h1 class="auth-title">Paddle Vault</h1>
    <p class="auth-sub">Pickleball Collection Tracker</p>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider"><span>or</span></div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Create Account</button>
    </div>
    <div id="form-login">
      <div class="auth-field"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"></div>
      <div id="login-error" class="auth-error"></div>
      <button class="auth-btn" onclick="signIn()">Sign In</button>
      <button class="auth-btn-ghost" onclick="signInGuest()">Continue as Guest</button>
    </div>
    <div id="form-signup" style="display:none">
      <div class="auth-field"><label>Display Name</label><input type="text" id="signup-name" placeholder="Your name"></div>
      <div class="auth-field"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email"></div>
      <div class="auth-field"><label>Password</label><input type="password" id="signup-pass" placeholder="Min 6 characters" autocomplete="new-password"></div>
      <div id="signup-error" class="auth-error"></div>
      <button class="auth-btn" onclick="signUp()">Create Account</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
<div id="app">
  <div class="app-header">
    <div class="logo-icon">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <path d="M17 2 C11.5 2 7 6.2 7 12 C7 18.5 10 24 17 26 C24 24 27 18.5 27 12 C27 6.2 22.5 2 17 2 Z" fill="white" opacity="0.96"/>
        <path d="M13.5 26 Q13 28.5 14 29.5 L14 43 Q15.5 44.5 17 44.5 Q18.5 44.5 20 43 L20 29.5 Q21 28.5 20.5 26 Z" fill="#1a4b8c"/>
        <line x1="14.3" y1="32" x2="19.7" y2="32" stroke="#74b0f5" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
        <line x1="14.3" y1="35.5" x2="19.7" y2="35.5" stroke="#74b0f5" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
        <line x1="14.3" y1="39" x2="19.7" y2="39" stroke="#74b0f5" stroke-width="1.3" stroke-linecap="round" opacity="0.8"/>
        <rect x="13.5" y="42" width="7" height="2.5" rx="1.2" fill="rgba(196,220,251,0.9)"/>
        <circle cx="34" cy="11" r="8.5" fill="#fbbf24"/>
        <circle cx="31.5" cy="8.5" r="2.2" fill="rgba(255,255,255,0.25)"/>
        <circle cx="34" cy="4.2" r="1.15" fill="rgba(150,75,0,0.58)"/>

let collection=[],collData={},reports=[],customPaddles=[];

// ── IMAGE DB ──────────────────────────────────────────────────
let imageDB=null;
function openImageDB(){return new Promise(resolve=>{const req=indexedDB.open('PaddleVaultImages',1);req.onupgradeneeded=e=>e.target.result.createObjectStore('photos');req.onsuccess=e=>{imageDB=e.target.result;resolve(imageDB);};req.onerror=()=>resolve(null);});}
async function saveImage(key,b64){if(!imageDB)return;return new Promise(resolve=>{const tx=imageDB.transaction('photos','readwrite');tx.objectStore('photos').put(b64,key);tx.oncomplete=()=>resolve(true);tx.onerror=()=>resolve(false);});}
async function loadImage(key){if(!imageDB||!key)return null;return new Promise(resolve=>{const tx=imageDB.transaction('photos','readonly');const req=tx.objectStore('photos').get(key);req.onsuccess=()=>resolve(req.result||null);req.onerror=()=>resolve(null);});}
async function deleteImage(key){if(!imageDB||!key)return;return new Promise(resolve=>{const tx=imageDB.transaction('photos','readwrite');tx.objectStore('photos').delete(key);tx.oncomplete=()=>resolve();});}
function makeImageKey(id){return`photo_${currentUser?currentUser.uid:'guest'}_${id}`;}

// ── AUTH ──────────────────────────────────────────────────────
function switchAuthTab(tab){
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-signup').classList.toggle('active',tab==='signup');
  document.getElementById('form-login').style.display=tab==='login'?'block':'none';
  document.getElementById('form-signup').style.display=tab==='signup'?'block':'none';
  document.getElementById('login-error').textContent='';
  document.getElementById('signup-error').textContent='';
}

async function signInWithGoogle(){
  const provider=new firebase.auth.GoogleAuthProvider();
  try{await auth.signInWithPopup(provider);}
  catch(e){document.getElementById('login-error').textContent=friendlyAuthError(e.code);}
}

async function signIn(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='Please enter email and password.';return;}
  try{await auth.signInWithEmailAndPassword(email,pass);}
  catch(e){errEl.textContent=friendlyAuthError(e.code);}
}

async function signUp(){
  const name=document.getElementById('signup-name').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const pass=document.getElementById('signup-pass').value;
  const errEl=document.getElementById('signup-error');
  errEl.textContent='';
  if(!name||!email||!pass){errEl.textContent='All fields required.';return;}
  if(pass.length<6){errEl.textContent='Password must be at least 6 characters.';return;}
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,pass);
    await cred.user.updateProfile({displayName:name});
  }catch(e){errEl.textContent=friendlyAuthError(e.code);}
}

function signInGuest(){isGuest=true;currentUser=null;showApp('Guest');}

function doSignOut(){
  if(isGuest){isGuest=false;currentUser=null;collection=[];collData={};reports=[];customPaddles=[];document.getElementById('main-app').style.display='none';document.getElementById('auth-screen').style.display='flex';return;}
  auth.signOut();
}

auth.onAuthStateChanged(user=>{
  if(user){isGuest=false;currentUser=user;showApp(user.displayName||user.email.split('@')[0]);loadUserData();}
  else if(!isGuest){document.getElementById('auth-screen').style.display='flex';document.getElementById('main-app').style.display='none';}
});

function showApp(name){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('user-greeting').textContent=`Hi, ${name}`;
  init();
}

function friendlyAuthError(code){
  const m={'auth/user-not-found':'No account found with that email.','auth/wrong-password':'Incorrect password.','auth/invalid-credential':'Incorrect email or password.','auth/email-already-in-use':'An account with that email already exists.','auth/invalid-email':'Please enter a valid email address.','auth/too-many-requests':'Too many attempts. Please try again later.','auth/network-request-failed':'Network error. Check your connection.','auth/popup-closed-by-user':'Sign-in popup was closed.','auth/cancelled-popup-request':'Sign-in cancelled.'};
  return m[code]||'Something went wrong. Please try again.';
}

document.addEventListener('keydown',e=>{if(e.key!=='Enter')return;if(document.getElementById('auth-screen').style.display==='none')return;const loginVisible=document.getElementById('form-login').style.display!=='none';if(loginVisible)signIn();else signUp();});

// ── DATA ──────────────────────────────────────────────────────
async function loadUserData(){
  if(isGuest){collection=JSON.parse(localStorage.getItem('pv_collection')||'[]');collData=JSON.parse(localStorage.getItem('pv_coll_data')||'{}');reports=JSON.parse(localStorage.getItem('pv_reports')||'[]');customPaddles=JSON.parse(localStorage.getItem('pv_custom')||'[]');updateStats();if(currentView==='collection')renderCollection();if(currentView==='browse')renderPaddles();return;}
  try{const snap=await db.collection('users').doc(currentUser.uid).get();if(snap.exists){const d=snap.data();collection=d.collection||[];collData=d.collData||{};reports=d.reports||[];customPaddles=d.customPaddles||[];}updateStats();if(currentView==='collection')renderCollection();if(currentView==='browse')renderPaddles();}
  catch(e){console.warn('Firestore load failed',e);collection=JSON.parse(localStorage.getItem('pv_collection')||'[]');collData=JSON.parse(localStorage.getItem('pv_coll_data')||'{}');reports=JSON.parse(localStorage.getItem('pv_reports')||'[]');customPaddles=JSON.parse(localStorage.getItem('pv_custom')||'[]');updateStats();}
}

async function saveUserData(){
  localStorage.setItem('pv_collection',JSON.stringify(collection));localStorage.setItem('pv_coll_data',JSON.stringify(collData));localStorage.setItem('pv_reports',JSON.stringify(reports));localStorage.setItem('pv_custom',JSON.stringify(customPaddles));
  if(isGuest||!currentUser)return;
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{try{await db.collection('users').doc(currentUser.uid).set({collection,collData,reports,customPaddles,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(e){console.error('Firestore save error',e);}},800);
}

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  await openImageDB();
  populateBrandFilters();
  populateSelects();
  renderPaddles();
  updateStats();
}

function populateBrandFilters(){
  const wrap=document.getElementById('brand-filters');
  wrap.innerHTML='';
  const allChip=document.createElement('div');
  allChip.className='filter-chip';allChip.textContent='All';
  allChip.onclick=()=>setBrandFilter('All',allChip);wrap.appendChild(allChip);
  [...new Set(PADDLES.map(p=>p.brand))].sort().forEach(b=>{
    const c=document.createElement('div');
    c.className='filter-chip'+(b==='CRBN'?' active':'');
    c.textContent=b;c.onclick=()=>setBrandFilter(b,c);wrap.appendChild(c);
    if(b==='CRBN')setTimeout(()=>c.scrollIntoView({inline:'center',behavior:'smooth'}),300);
  });
}

function populateSelects(){
  ['custom-brand','report-brand'].forEach(id=>{const s=document.getElementById(id);s.innerHTML='<option value="">Select brand…</option>';BRANDS.forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;s.appendChild(o);});});
  ['custom-year','report-year'].forEach(id=>{const s=document.getElementById(id);s.innerHTML='<option value="">Select year…</option>';for(let y=2026;y>=2015;y--){const o=document.createElement('option');o.value=y;o.textContent=y;s.appendChild(o);}});
}

function showView(name){
  currentView=name;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  ['browse','collection','add','report'].forEach((v,i)=>{if(v===name)document.querySelectorAll('.nav-tab')[i]?.classList.add('active');});
  if(name==='collection')renderCollection();if(name==='report')renderReports();if(name==='browse')renderPaddles();
}

function setBrandFilter(b,el){activeBrandFilter=b;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderPaddles();}
function filterPaddles(q){searchQuery=q.toLowerCase();renderPaddles();}
function getAllPaddles(){return[...PADDLES,...customPaddles.map((p,i)=>({...p,id:'custom_'+i,tags:['Custom']}))]}

function renderPaddles(){
  const list=document.getElementById('paddle-list');
  let p=getAllPaddles();
  if(activeBrandFilter!=='All')p=p.filter(x=>x.brand===activeBrandFilter);
  if(searchQuery)p=p.filter(x=>x.brand.toLowerCase().includes(searchQuery)||x.model.toLowerCase().includes(searchQuery)||(x.tags||[]).some(t=>t.toLowerCase().includes(searchQuery)));
  if(!p.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No paddles found</div></div>`;return;}
  list.innerHTML=p.map(x=>paddleCardHTML(x)).join('');
  p.forEach(x=>{const cd=collData[x.id];if(cd?.photoKey)loadAndShowPhoto(x.id,cd.photoKey);});
}

async function loadAndShowPhoto(paddleId,photoKey){const img=document.querySelector(`[data-photo-target="${paddleId}"]`);if(!img)return;const src=await loadImage(photoKey);if(src){img.src=src;img.style.display='block';}}

function paddleCardHTML(p){
  const inColl=collection.includes(p.id);const cd=collData[p.id];
  return`<div class="paddle-card" onclick="openDetail(${JSON.stringify(p.id)})">
    <div class="paddle-card-header">
      <div class="paddle-thumb">${cd?.photoKey?`<img data-photo-target="${p.id}" style="display:none;width:100%;height:100%;object-fit:cover;" src="">`:
      `<svg width="20" height="28" viewBox="0 0 44 44" fill="none"><path d="M17 2 C11.5 2 7 6.2 7 12 C7 18.5 10 24 17 26 C24 24 27 18.5 27 12 C27 6.2 22.5 2 17 2 Z" fill="white" opacity="0.65"/><path d="M13.5 26 Q13 28.5 14 29.5 L14 43 Q15.5 44.5 17 44.5 Q18.5 44.5 20 43 L20 29.5 Q21 28.5 20.5 26 Z" fill="rgba(196,220,251,0.75)"/></svg>`}
      </div>
      <div class="paddle-info">
        <div class="paddle-brand">${p.brand}</div>
        <div class="paddle-name">${p.model}</div>
        <div class="paddle-year">${p.year}${p.surface?' · '+p.surface:''}${p.shape?' · '+p.shape:''}</div>
        <div class="paddle-stars">${starsHTML(cd?.rating||0)}</div>
      </div>
      ${inColl?'<span class="in-collection-badge">✓ Vault</span>':''}
    </div>
    <div>${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    ${cd?.notes?`<div class="paddle-note">"${cd.notes}"</div>`:''}
  </div>`;
}

function starsHTML(r){let h='';for(let i=1;i<=5;i++)h+=`<span class="star ${i<=r?'filled':''}">★</span>`;return h;}

async function renderCollection(){
  const list=document.getElementById('collection-list');
  if(!collection.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">🏓</div><div class="empty-text">Your vault is empty.<br>Browse paddles and add them!</div></div>`;return;}
  const all=getAllPaddles();list.innerHTML=collection.map(id=>{const p=all.find(x=>x.id==id);return p?paddleCardHTML(p):'';}).join('');
  collection.forEach(id=>{const cd=collData[id];if(cd?.photoKey)loadAndShowPhoto(id,cd.photoKey);});
}

function updateStats(){
  document.getElementById('stat-collection').textContent=collection.length;
  const all=getAllPaddles();document.getElementById('stat-total').textContent=all.length;document.getElementById('stat-brands').textContent=new Set(all.map(p=>p.brand)).size;
  const ratings=collection.map(id=>collData[id]?.rating).filter(r=>r>0);
  document.getElementById('stat-avg').textContent=ratings.length?(ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1):'—';
}

async function openDetail(paddleId){
  const p=getAllPaddles().find(x=>x.id==paddleId);if(!p)return;
  const inColl=collection.includes(paddleId);const cd=collData[paddleId]||{rating:0,notes:'',photoKey:null};
  window._mR=cd.rating;window._mPhotoKey=cd.photoKey||null;window._mNewPhoto=null;
  let photoSrc=null;if(cd.photoKey)photoSrc=await loadImage(cd.photoKey);
  const thumbHTML=photoSrc?`<img src="${photoSrc}" style="width:100%;height:100%;object-fit:cover;">`:`<svg width="28" height="40" viewBox="0 0 44 44" fill="none"><path d="M17 2 C11.5 2 7 6.2 7 12 C7 18.5 10 24 17 26 C24 24 27 18.5 27 12 C27 6.2 22.5 2 17 2 Z" fill="white" opacity="0.75"/><path d="M13.5 26 Q13 28.5 14 29.5 L14 43 Q15.5 44.5 17 44.5 Q18.5 44.5 20 43 L20 29.5 Q21 28.5 20.5 26 Z" fill="rgba(116,176,245,0.8)"/></svg>`;
  document.getElementById('modal-content').innerHTML=`
    <div class="modal-title">${p.model}</div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
      <div class="paddle-thumb" style="width:66px;height:66px;border-radius:12px;">${thumbHTML}</div>
      <div>
        <div class="paddle-brand" style="font-size:12px;">${p.brand}</div>
        <div style="font-size:14px;font-weight:600;color:var(--text-main);margin-top:2px;">${p.year}${p.surface?' · '+p.surface:''}</div>
        ${p.shape?`<div style="font-size:11px;color:var(--text-soft);margin-top:1px;">${p.shape} shape</div>`:''}
        <div>${(p.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </div>
    <hr style="border:none;border-top:1px solid var(--card-border);margin:13px 0;">
    <div class="form-group"><label>Your Rating</label>
      <div class="star-input" id="modal-stars">
        ${[1,2,3,4,5].map(i=>`<button class="star-btn ${i<=cd.rating?'active':''}" onclick="setMR(${JSON.stringify(paddleId)},${i})">★</button>`).join('')}
      </div></div>
    <div class="form-group"><label>Notes</label><textarea id="modal-notes" placeholder="Your thoughts…">${cd.notes||''}</textarea></div>
    <div class="form-group"><label>Photo <span style="font-size:10px;color:var(--text-soft);font-weight:400;text-transform:none;">(saved locally on this device)</span></label>
      <label class="photo-upload" for="modal-photo-input">
        <input type="file" id="modal-photo-input" accept="image/*" onchange="prevMPhoto(this)">
        <div class="photo-upload-icon">📷</div><div class="photo-upload-text">Upload your own photo</div>
        ${photoSrc?`<img src="${photoSrc}" class="photo-preview" id="modal-photo-preview">`:'<img class="photo-preview" id="modal-photo-preview" style="display:none">'}
      </label></div>
    <button class="primary-btn" onclick="saveMD(${JSON.stringify(paddleId)},${inColl})">${inColl?'💾 Save Changes':'+ Add to My Vault'}</button>
    ${inColl?`<button class="secondary-btn" style="color:#dc2626;border-color:#fca5a5;" onclick="remVault(${JSON.stringify(paddleId)})">Remove from Vault</button>`:''}
  `;
  document.getElementById('detail-modal').classList.add('open');
}

function setMR(pid,val){window._mR=val;document.querySelectorAll('#modal-stars .star-btn').forEach((b,i)=>b.classList.toggle('active',i<val));}
function prevMPhoto(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{window._mNewPhoto=e.target.result;const img=document.getElementById('modal-photo-preview');if(img){img.src=e.target.result;img.style.display='block';}};r.readAsDataURL(f);}

async function saveMD(paddleId,wasInColl){
  const notes=document.getElementById('modal-notes').value;
  let photoKey=collData[paddleId]?.photoKey||null;
  if(window._mNewPhoto){photoKey=makeImageKey(paddleId);await saveImage(photoKey,window._mNewPhoto);}
  collData[paddleId]={rating:window._mR||0,notes,photoKey};
  if(!wasInColl)collection.push(paddleId);
  updateStats();closeModal();await saveUserData();
  showToast(wasInColl?'💾 Changes saved':'🏓 Added to your Vault!');
  if(currentView==='collection')renderCollection();if(currentView==='browse')renderPaddles();
}

async function remVault(paddleId){
  collection=collection.filter(id=>id!=paddleId);
  if(collData[paddleId]?.photoKey)await deleteImage(collData[paddleId].photoKey);
  delete collData[paddleId];
  updateStats();closeModal();await saveUserData();showToast('Removed from Vault');
  if(currentView==='collection')renderCollection();if(currentView==='browse')renderPaddles();
}

function closeModal(){document.getElementById('detail-modal').classList.remove('open');}
document.getElementById('detail-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function setRating(val){customRating=val;document.querySelectorAll('#custom-stars .star-btn').forEach((b,i)=>b.classList.toggle('active',i<val));}
function onCustomBrandChange(){document.getElementById('custom-other-brand-wrap').style.display=document.getElementById('custom-brand').value==='Other'?'block':'none';}
function onReportBrandChange(){document.getElementById('report-other-brand-wrap').style.display=document.getElementById('report-brand').value==='Other'?'block':'none';}
function previewPhoto(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{customPhotoData=e.target.result;const img=document.getElementById('photo-preview-img');img.src=e.target.result;img.style.display='block';};r.readAsDataURL(f);}

async function saveCustomPaddle(){
  const brand=document.getElementById('custom-brand').value,ob=document.getElementById('custom-other-brand').value;
  const model=document.getElementById('custom-model').value.trim(),year=document.getElementById('custom-year').value;
  const notes=document.getElementById('custom-notes').value.trim();
  const fb=brand==='Other'?ob.trim():brand;
  if(!fb||!model){showToast('⚠️ Brand and model required');return;}
  customPaddles.push({brand:fb,model,year:parseInt(year)||2024,surface:'Custom',notes,rating:customRating});
  const pid='custom_'+(customPaddles.length-1);collection.push(pid);
  let photoKey=null;if(customPhotoData){photoKey=makeImageKey(pid);await saveImage(photoKey,customPhotoData);}
  collData[pid]={rating:customRating,notes,photoKey};
  updateStats();clearCustomForm();await saveUserData();showToast('🎉 Paddle saved to your Vault!');showView('collection');
}

function clearCustomForm(){
  ['custom-brand','custom-model','custom-year','custom-notes','custom-other-brand'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('custom-other-brand-wrap').style.display='none';document.getElementById('photo-preview-img').style.display='none';document.getElementById('custom-photo-input').value='';
  customRating=0;customPhotoData=null;document.querySelectorAll('#custom-stars .star-btn').forEach(b=>b.classList.remove('active'));
}

async function submitReport(){
  const brand=document.getElementById('report-brand').value,ob=document.getElementById('report-other-brand').value;
  const model=document.getElementById('report-model').value.trim(),year=document.getElementById('report-year').value;
  const details=document.getElementById('report-details').value.trim();
  const fb=brand==='Other'?ob.trim():brand;
  if(!fb||!model){showToast('⚠️ Brand and model required');return;}
  reports.push({brand:fb,model,year,details,date:new Date().toLocaleDateString()});
  ['report-brand','report-model','report-year','report-details','report-other-brand'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('report-other-brand-wrap').style.display='none';
  await saveUserData();showToast('✓ Report submitted. Thank you!');renderReports();
}

function renderReports(){
  const list=document.getElementById('reports-list');
  if(!reports.length){list.innerHTML='';return;}
  list.innerHTML=`<div class="section-title" style="margin-top:8px;">YOUR REPORTS</div>`+reports.map(r=>`<div class="paddle-card" style="cursor:default;"><div class="paddle-brand">${r.brand}</div><div class="paddle-name">${r.model}</div><div class="paddle-year">${r.year?r.year+' · ':''}Reported ${r.date}</div>${r.details?`<div class="paddle-note">${r.details}</div>`:''}</div>`).join('');
}

let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2300);}
</script>
</body>
</html>
